name: 🐍 Python Compatibility Check
on: [ push ]

jobs:
  linux-python-compatibility:
    runs-on: aks-spot-4cpu
    strategy:
      matrix:
        python-version: [ '3.10', '3.11', '3.12', '3.13' ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --all-extras --dev

      - name: Smoke import
        run: |
          export LC_ALL=C.UTF-8
          export LANG=C.UTF-8
          uv run --python ${{ matrix.python-version }} python -c "
          import riocli
          from riocli.bootstrap import safe_cli
          print('smoke imports OK')
          "

      - name: Run the CLI
        run: |
          export LC_ALL=C.UTF-8
          export LANG=C.UTF-8
          uv run --python ${{ matrix.python-version }} rio --help

      - name: Run unit tests
        run: uv run --python ${{ matrix.python-version }} pytest tests/unit/ -v --tb=short

  windows-python-compatibility:
    runs-on: windows-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: [ '3.10', '3.11', '3.12', '3.13' ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --all-extras --dev

      - name: Run the CLI
        run: uv run --python ${{ matrix.python-version }} rio --help

      - name: Run unit tests
        run: uv run --python ${{ matrix.python-version }} pytest tests/unit/ -v --tb=short
