---
apiVersion: api.rapyuta.io/v2
kind: UserGroup
metadata:
  name: usergroup
  labels:
    key: value
spec:
  description: This is a sample user group description
  members:
  - subject:
      kind: User
      name: test.user@rapyuta.io
    roles: [group_admin]
  - subject:
      kind: ServiceAccount
      name: deployer
    roles: [group_viewer]
  roles:
  - domain:
      kind: Organization
      name: "warehouse"
    roles: [org_admin]
  - domain:
      kind: Project
      name: site-1
    roles: [project_admin]
  - domain:
      kind: Project
      name: site-2
    roles: [project_viewer]
