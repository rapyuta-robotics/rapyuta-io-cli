---
apiVersion: apiextensions.rapyuta.io/v1
kind: Deployment
metadata:
  name: deployment-ros-cloud
  depends:
    kind: package
    nameOrGUID: package-ros-cloud
    version: "v1.0.0"
  region: jp
  labels:
    app: test
spec:
  runtime: cloud
  depends:
    - kind: deployment
      nameOrGUID: deployment-dependency
      wait: false
  volumes:
    - execName: exec-docker
      mountPath: /tmp # Path on container
      subPath: /tmp # Path on volume
      depends:
        kind: disk
        nameOrGUID: deployment-disk
  staticRoutes:
    - name: NAME
      depends:
        kind: staticroute
        nameOrGUID: deployment-route
  rosNetworks:
    - depends:
        kind: network
        nameOrGUID: deployment-network
---
apiVersion: apiextensions.rapyuta.io/v1
kind: Deployment
metadata:
  name: deployment-ros-device
  depends:
    kind: package
    nameOrGUID: package-ros-device
    version: v1.0.0
  labels:
    app: test
spec:
  runtime: device
  device:
    depends:
      kind: device
      nameOrGUID: deployment-device
  restart: always
  rosNetworks:
    - depends:
        kind: network
        nameOrGUID: "deployment-network"
