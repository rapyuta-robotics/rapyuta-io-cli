apiVersion: "api.rapyuta.io/v2"
kind: "Database"
metadata:
  name: "orders-db"
  labels:
    app: orders
spec:
  type: postgres
  postgres:
    version: "17"  # Supported: 16, 17, 18
    primary:
      deviceName: edge-node-01
      dataDirectory: /opt/rapyuta/volumes/orders-db
      port: 5432
    # Credentials reference keys in an Opaque secret (immutable after creation).
    # Create the secret first, e.g.:
    #   rio secret create orders-db-secret --type opaque \
    #     PRIMARY_USER=app PRIMARY_PASS=... BACKUP_USER=rio_backup BACKUP_PASS=...
    credentials:
      primary:
        username:
          secretKeyRef: {name: orders-db-secret, key: PRIMARY_USER}
        password:
          secretKeyRef: {name: orders-db-secret, key: PRIMARY_PASS}
      backup:
        username:
          secretKeyRef: {name: orders-db-secret, key: BACKUP_USER}
        password:
          secretKeyRef: {name: orders-db-secret, key: BACKUP_PASS}
    multipleDatabase:
      - orders
      - analytics
    parameters:
      max_connections: "200"
      shared_buffers: 512MB
