$schema: http://json-schema.org/draft-07/schema#
title: Organization
description: A namespace for projects on Rapyuta
$ref: "#/definitions/organization"
definitions:
  organization:
    type: object
    properties:
      apiVersion:
        default: api.rapyuta.io/v2
        oneOf:
        - const: apiextensions.rapyuta.io/v1
        - const: api.rapyuta.io/v2
      kind:
        const: Organization
      metadata:
        "$ref": "#/definitions/metadata"
      spec:
        "$ref": "#/definitions/organizationSpec"

    required:
    - apiVersion
    - kind
    - metadata
    - spec

  metadata:
    type: object
    properties:
      name:
        type: string
        # TODO(ankit): Confirm regex
        pattern: "^[a-zA-Z][a-z A-Z0-9-_]{2,63}$"
      guid:
        $ref: "#/definitions/organizationGUID"
      organizationGUID:
        $ref: "#/definitions/organizationGUID"
      organizationCreatorGUID:
        type: string
      creatorGUID:
        type: string
      organizationName:
        type: string
    required:
    - name
    - guid

  organizationSpec:
    type: object
    properties:
      members:
        type: array
        items:
          "$ref": "#/definitions/member"
    additionalProperties: false

  member:
    type: object
    properties:
      subject:
        type: object
        properties:
          kind:
            type: string
            enum:
            - User
            - UserGroup
            - ServiceAccount
          guid:
            type: string
          name:
            type: string
        required:
        - kind
        anyOf:
        - required:
          - guid
        - required:
          - name
      roleNames:
        type: array
        items:
          type: string
    required:
    - subject
    - roleNames

  organizationGUID:
    type: string
    pattern: "^org-[a-z0-9]{20,24}$"
